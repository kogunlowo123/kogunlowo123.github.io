<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0c0b;--bg2:#141514;--bg3:#1a1b1a;--text:#f5f2eb;--text2:#b0ada6;--accent:#c8420a;--accent2:#e05a1a;--border:#2a2b2a;--green:#2ea043;--blue:#3b82f6;--purple:#8b5cf6;--cyan:#06b6d4;--yellow:#eab308;--pink:#ec4899;--orange:#f97316;--teal:#14b8a6}
html{scroll-behavior:smooth}
body{font-family:'Cascadia Code','Fira Code','SF Mono','Consolas',monospace;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--accent2);text-decoration:none;transition:color .2s}
a:hover{color:var(--text)}

nav{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
nav .inner{max-width:1400px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
nav .brand{font-size:14px;font-weight:700;color:var(--accent)}
nav .links{display:flex;gap:24px;flex-wrap:wrap}
nav .links a{font-size:13px;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
nav .links a:hover{color:var(--accent2)}

.container{max-width:1400px;margin:0 auto;padding:32px 24px}
.page-title{font-size:clamp(20px,3vw,32px);font-weight:700;margin-bottom:8px}
.page-subtitle{color:var(--text2);font-size:14px;margin-bottom:32px}

/* SEARCH */
.controls{margin-bottom:32px}
.search-box{width:100%;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:16px}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--text2)}

.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.filter-row label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;width:100%;margin-bottom:4px}
.filter-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

.results-count{font-size:13px;color:var(--text2);margin-bottom:16px}

/* GRID */
.repo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.repo-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;transition:border-color .2s,transform .2s;display:flex;flex-direction:column}
.repo-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.repo-card .repo-name{font-size:15px;font-weight:700;margin-bottom:8px;word-break:break-word}
.repo-card .repo-name a{color:var(--text)}
.repo-card .repo-name a:hover{color:var(--accent2)}
.repo-card .badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.badge{padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block}
.badge-aws{background:#1a2733;color:#f97316;border:1px solid #2a3a4a}
.badge-azure{background:#1a1a33;color:#3b82f6;border:1px solid #2a2a4a}
.badge-gcp{background:#1a2a1a;color:#2ea043;border:1px solid #2a3a2a}
.badge-aiml{background:#2a1a2a;color:#ec4899;border:1px solid #3a2a3a}
.badge-mcp{background:#1a2a2a;color:#06b6d4;border:1px solid #2a3a3a}
.badge-security{background:#2a2a1a;color:#eab308;border:1px solid #3a3a2a}
.badge-platform{background:#1a1a2a;color:#8b5cf6;border:1px solid #2a2a3a}
.badge-frontend{background:#2a1a1a;color:#f97316;border:1px solid #3a2a2a}
.badge-docs{background:#1a1a1a;color:#b0ada6;border:1px solid #2a2a2a}
.badge-agentforge{background:#2a1a2a;color:#a855f7;border:1px solid #3a2a3a}
.badge-lang{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.repo-card .desc{font-size:13px;color:var(--text2);flex:1;margin-bottom:10px}
.repo-card .tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.tag{font-size:10px;color:var(--text2);background:var(--bg);padding:2px 8px;border-radius:4px}
.repo-card .arch-link{font-size:12px;color:var(--accent);margin-top:auto}
.repo-card .arch-link:hover{color:var(--accent2)}

footer{border-top:1px solid var(--border);padding:32px 24px;text-align:center;color:var(--text2);font-size:12px;margin-top:48px}
</style>
</head>

var catMap={infrastructure:"Infrastructure",aiml:"AI/ML",api:"API/Service",security:"Security",platform:"Platform",frontend:"Frontend",documentation:"Documentation"};
var badgeMap={infrastructure:"badge-aws",aiml:"badge-aiml",api:"badge-mcp",security:"badge-security",platform:"badge-platform",frontend:"badge-frontend",documentation:"badge-docs"};

function cloudBadgeClass(c){return{aws:"badge-aws",azure:"badge-azure",gcp:"badge-gcp",multi:"badge-platform"}[c]||"badge-docs"}

var activeCat="all",activeCloud="all";

function renderRepos(){
  var q=document.getElementById("search").value.toLowerCase();
  var grid=document.getElementById("repoGrid");
  grid.innerHTML="";
  var count=0;
  repos.forEach(function(r){
    if(activeCat!=="all"&&r.cat!==activeCat)return;
    if(activeCloud!=="all"&&r.cloud!==activeCloud)return;
    var searchStr=(r.name+" "+r.desc+" "+r.industries.join(" ")+" "+r.lang+" "+r.cat+" "+r.cloud).toLowerCase();
    if(q&&searchStr.indexOf(q)===-1)return;
    count++;
    var card=document.createElement("div");
    card.className="repo-card";
    card.innerHTML='<div class="repo-name"><a href="https://github.com/kogunlowo123/'+r.name+'" target="_blank" rel="noopener">'+r.name+'</a></div>'+
      '<div class="badges"><span class="badge '+(badgeMap[r.cat]||"badge-docs")+'">'+catMap[r.cat]+'</span>'+
      '<span class="badge '+cloudBadgeClass(r.cloud)+'">'+r.cloud.toUpperCase()+'</span>'+
      '<span class="badge badge-lang">'+r.lang+'</span></div>'+
      '<div class="desc">'+r.desc+'</div>'+
      '<div class="tags">'+r.industries.map(function(t){return'<span class="tag">'+t+'</span>'}).join("")+'</div>'+
      '<a class="arch-link" href="../docs/'+r.name+'/architecture.html">View Architecture &rarr;</a>';
    grid.appendChild(card);
  });
  document.getElementById("resultsCount").textContent="Showing "+count+" of "+repos.length+" repositories";
}

document.getElementById("search").addEventListener("input",renderRepos);

document.querySelectorAll("#catFilters .filter-btn").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll("#catFilters .filter-btn").forEach(function(b){b.classList.remove("active")});
    btn.classList.add("active");
    activeCat=btn.getAttribute("data-cat");
    renderRepos();
  });
});

document.querySelectorAll("#cloudFilters .filter-btn").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll("#cloudFilters .filter-btn").forEach(function(b){b.classList.remove("active")});
    btn.classList.add("active");
    activeCloud=btn.getAttribute("data-cloud");
    renderRepos();
  });
});

renderRepos();
